name: Build

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'web/**'
      - 'tools/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build daemon + tweak
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          ref: master

      - name: Fetch Theos submodules
        run: |
          cd theos
          git submodule update --init --depth 1

      - name: Set up environment
        run: |
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV
          echo "TARGET=iphone:latest:14.0" >> $GITHUB_ENV
          echo "SYSROOT=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || echo '')" >> $GITHUB_ENV

      - name: Install ldid (code sign tool)
        run: |
          brew install ldid

      - name: Prepare Theos build directory
        run: |
          mkdir -p .theos
          touch .theos/build_session

      - name: Build daemon
        run: |
          make fingerdumpd

      - name: Build tweak
        run: |
          make FingerDumpTweak

      - name: Prepare package layout
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/libexec
          mkdir -p pkg/Library/MobileSubstrate/DynamicLibraries
          mkdir -p pkg/var/mobile/Library/FingerDump/www
          mkdir -p "pkg/Library/Application Support/FingerDump"

          cp control pkg/DEBIAN/
          cp postinst pkg/DEBIAN/
          chmod 755 pkg/DEBIAN/postinst

          cp .theos/obj/debug/fingerdumpd pkg/usr/libexec/
          cp .theos/obj/debug/FingerDumpTweak.dylib pkg/Library/MobileSubstrate/DynamicLibraries/
          cp FingerDump.plist pkg/Library/MobileSubstrate/DynamicLibraries/FingerDumpTweak.plist

          cp -r web/* pkg/var/mobile/Library/FingerDump/www/
          cp -r web/* "pkg/Library/Application Support/FingerDump/"

      - name: Install dpkg
        run: |
          brew install dpkg

      - name: Build .deb
        run: |
          cd pkg
          find . -type d -exec chmod 755 {} \;
          find . -type f -name "*.dylib" -exec chmod 644 {} \;
          find . -type f -name "*.plist" -exec chmod 644 {} \;
          chmod 755 usr/libexec/fingerdumpd
          chmod 755 DEBIAN/postinst

          dpkg-deb -Zgzip -b . ../FingerDump_${{ github.sha }}_iphoneos-arm64.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: FingerDump-deb
          path: FingerDump_*.deb
          compression-level: 0

  lint:
    name: Validate project files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          missing=0
          for f in \
            Tweak.xm \
            FingerDump.plist \
            daemon/fingerdumpd.m \
            daemon/scanner.m \
            daemon/socket_server.m \
            daemon/hardware.m \
            daemon/system.m \
            daemon/network.m \
            daemon/graphics.m \
            daemon/audio.m \
            daemon/sensor.m \
            daemon/font.m \
            daemon/persistence.m \
            daemon/behavioral.m \
            daemon/browser.m \
            shared/types.h \
            shared/protocol.h \
            shared/categories.c \
            web/index.html \
            web/canvas_fingerprint.js \
            web/webgl_fingerprint.js \
            web/audio_fingerprint.js \
            web/font_enumeration.js \
            web/network_leaks.js \
            control \
            Makefile; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Some files are missing!"
            exit 1
          fi
          echo "All required files present: OK"

  release:
    name: Create release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built deb
        uses: actions/download-artifact@v4
        with:
          name: FingerDump-deb
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FingerDump_*.deb
          generate_release_notes: true
